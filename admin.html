<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <meta name="robots" content="noindex, nofollow" />
  <title>KrishnaVerse · Shop Admin</title>
  <style>
    :root{
      --saffron:#E8690A; --ink:#1A1A3E; --bg:#0D0D1E; --card:#16162e;
      --line:#2a2a4a; --muted:#9a9ab5; --txt:#f4f4fb; --ok:#2D8A4E; --err:#C0392B;
    }
    *{box-sizing:border-box}
    body{margin:0;font-family:Inter,system-ui,Segoe UI,Roboto,sans-serif;background:var(--bg);color:var(--txt);}
    a{color:var(--saffron)}
    .wrap{max-width:920px;margin:0 auto;padding:20px 16px 80px;}
    header.bar{display:flex;align-items:center;justify-content:space-between;gap:12px;margin-bottom:18px;}
    .brand{font-weight:800;font-size:18px}
    .brand small{display:block;font-weight:500;color:var(--muted);font-size:12px}
    .btn{border:none;border-radius:10px;padding:10px 16px;font-weight:700;cursor:pointer;font-size:14px}
    .btn-primary{background:var(--saffron);color:#fff}
    .btn-ghost{background:transparent;color:var(--muted);border:1px solid var(--line)}
    .btn-danger{background:rgba(192,57,43,.15);color:#ff8a7a;border:1px solid rgba(192,57,43,.4)}
    .btn-sm{padding:6px 12px;font-size:12px;border-radius:8px}
    .card{background:var(--card);border:1px solid var(--line);border-radius:16px;padding:20px;margin-bottom:18px}
    h2{font-size:16px;margin:0 0 14px}
    label{display:block;font-size:12px;color:var(--muted);margin:12px 0 5px;font-weight:600}
    input,select,textarea{width:100%;background:#0f0f24;border:1px solid var(--line);border-radius:10px;
      padding:11px 12px;color:var(--txt);font-size:14px;font-family:inherit}
    textarea{resize:vertical;min-height:64px}
    .grid2{display:grid;grid-template-columns:1fr 1fr;gap:12px}
    .grid3{display:grid;grid-template-columns:1fr 1fr 1fr;gap:12px}
    .row{display:flex;gap:10px;align-items:center}
    .msg{padding:10px 12px;border-radius:10px;font-size:13px;margin-top:12px;display:none}
    .msg.ok{display:block;background:rgba(45,138,78,.15);color:#7fe0a0}
    .msg.err{display:block;background:rgba(192,57,43,.15);color:#ff9a8c}
    .hidden{display:none!important}
    .plist{display:grid;gap:10px}
    .prow{display:flex;align-items:center;gap:12px;background:#0f0f24;border:1px solid var(--line);
      border-radius:12px;padding:10px 12px}
    .prow .em{font-size:26px;width:34px;text-align:center}
    .prow img{width:42px;height:42px;border-radius:8px;object-fit:cover}
    .prow .info{flex:1;min-width:0}
    .prow .nm{font-weight:700;font-size:14px}
    .prow .meta{font-size:11px;color:var(--muted)}
    .chip{display:inline-block;font-size:10px;padding:2px 7px;border-radius:20px;
      background:rgba(232,105,10,.15);color:var(--saffron);margin-left:6px}
    .muted{color:var(--muted);font-size:13px}
    .center{max-width:380px;margin:8vh auto 0}
    .note{font-size:12px;color:var(--muted);line-height:1.5;margin-top:8px}
    .toggle{display:flex;align-items:center;gap:8px;margin-top:14px}
    .toggle input{width:auto}
  </style>
</head>
<body>
  <div class="wrap">

    <!-- LOGIN -->
    <div id="loginView" class="center">
      <div class="card">
        <div class="brand" style="margin-bottom:14px">ॐ KrishnaVerse <small>Shop Admin Console</small></div>
        <label>Admin Email</label>
        <input type="email" id="email" placeholder="you@email.com" autocomplete="email" />
        <label>Password</label>
        <input type="password" id="password" placeholder="Your password" autocomplete="current-password" />
        <div style="height:14px"></div>
        <button class="btn btn-primary" id="loginBtn" style="width:100%">Sign In</button>
        <div class="msg" id="loginMsg"></div>
        <p class="note">Only authorized admin accounts can manage the catalog. Sign in with the email listed as an admin in <code>admin.js</code> / Firestore rules.</p>
      </div>
    </div>

    <!-- DASHBOARD -->
    <div id="adminView" class="hidden">
      <header class="bar">
        <div class="brand">ॐ Shop Admin <small id="whoami"></small></div>
        <div class="row">
          <a class="btn btn-ghost btn-sm" href="index.html" target="_blank">View site ↗</a>
          <button class="btn btn-ghost btn-sm" id="logoutBtn">Sign out</button>
        </div>
      </header>

      <!-- Add / Edit form -->
      <div class="card">
        <h2 id="formTitle">➕ Add a product</h2>
        <input type="hidden" id="pid" />
        <label>Product name *</label>
        <input id="f_name" placeholder="Brass Krishna Idol" />
        <div class="grid3">
          <div>
            <label>Category *</label>
            <select id="f_category">
              <option value="idols">Idols</option>
              <option value="counter">Mala / Counter</option>
              <option value="puja">Puja</option>
              <option value="books">Books</option>
              <option value="frames">Frames</option>
            </select>
          </div>
          <div>
            <label>Price (₹) *</label>
            <input id="f_price" type="number" min="0" placeholder="1299" />
          </div>
          <div>
            <label>Sort order</label>
            <input id="f_sort" type="number" placeholder="10" />
          </div>
        </div>
        <label>Description</label>
        <textarea id="f_desc" placeholder="Short product description shown on the card"></textarea>
        <div class="grid3">
          <div>
            <label>Emoji (fallback)</label>
            <input id="f_emoji" placeholder="🪈" />
          </div>
          <div>
            <label>Tag (optional)</label>
            <input id="f_tag" placeholder="Bestseller" />
          </div>
          <div>
            <label>Image URL (optional)</label>
            <input id="f_img" placeholder="https://..." />
          </div>
        </div>
        <div class="toggle">
          <input type="checkbox" id="f_stock" checked />
          <label for="f_stock" style="margin:0">In stock</label>
        </div>
        <div class="row" style="margin-top:16px">
          <button class="btn btn-primary" id="saveBtn">Save product</button>
          <button class="btn btn-ghost hidden" id="cancelBtn">Cancel edit</button>
        </div>
        <div class="msg" id="formMsg"></div>
      </div>

      <!-- Product list -->
      <div class="card">
        <div class="row" style="justify-content:space-between;margin-bottom:12px">
          <h2 style="margin:0">📦 Catalog (<span id="count">0</span>)</h2>
          <button class="btn btn-ghost btn-sm" id="seedBtn">Seed sample catalog</button>
        </div>
        <div class="plist" id="plist"><p class="muted">Loading…</p></div>
      </div>
    </div>

  </div>
  <!-- Firebase compat (global) SDK — classic scripts (see index.html note) -->
  <script src="https://www.gstatic.com/firebasejs/10.13.0/firebase-app-compat.js"></script>
  <script src="https://www.gstatic.com/firebasejs/10.13.0/firebase-auth-compat.js"></script>
  <script src="https://www.gstatic.com/firebasejs/10.13.0/firebase-firestore-compat.js"></script>
  <script src="firebase-config.js"></script>
  <script src="shop-data.js"></script>
  <script src="admin.js"></script>
</body>
</html>
